name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT: cvee-20260208
  REGION: europe-west1

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/1081304882492/locations/global/workloadIdentityPools/github-cd-pool/providers/github-cd-provider"
          service_account: "github-actions-cd@cvee-20260208.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/cvee/cvee-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f api/Dockerfile api/
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy API to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/cvee/cvee-api:${{ github.sha }}
          gcloud run deploy cvee-api \
            --image=$IMAGE \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT }} \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=2Gi \
            --timeout=120s \
            --max-instances=1

  deploy-ui:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/1081304882492/locations/global/workloadIdentityPools/github-cd-pool/providers/github-cd-provider"
          service_account: "github-actions-cd@cvee-20260208.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push UI
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/cvee/cvee-ui
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f ui/Dockerfile ui/
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy UI to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/cvee/cvee-ui:${{ github.sha }}
          gcloud run deploy cvee-ui \
            --image=$IMAGE \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT }} \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60s \
            --max-instances=1
