name: CI

on:
  push:
    branches: [main, refacto]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy api/

      - name: bandit
        run: uv run bandit -r api/ functions/ -x functions/pipeline/core.py --severity-level medium

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: pytest with coverage
        run: uv run pytest tests/ -v --cov

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t cvee-api:ci api/

      - name: Health check
        run: |
          docker run -d --rm -p 8080:8080 --name api cvee-api:ci
          for i in $(seq 1 20); do
            if curl -s http://localhost:8080/health | grep -q healthy; then
              echo "OK"; exit 0
            fi
            sleep 2
          done
          echo "FAIL"; docker logs api; exit 1

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build UI Docker image
        run: docker build -t cvee-ui:ci ui/

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform init
        run: terraform -chdir=infra init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra validate
